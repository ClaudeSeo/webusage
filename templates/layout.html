<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Title}}{{.Title}}{{else}}AI 사용량 대시보드{{end}}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        :root {
            /* Vercel Style Dark Theme Colors */
            --bg-primary: #000000;
            --bg-secondary: #0A0A0A;
            --bg-card: #111111;
            --bg-hover: #1A1A1A;
            
            /* Text colors - Vercel style */
            --text-primary: #EDEDED;
            --text-secondary: #888888;
            --text-muted: #666666;
            
            /* Accent colors - Vercel style */
            --accent-blue: #0070F3;
            --accent-blue-hover: #0066DD;
            --accent-green: #22c55e;
            --accent-green-hover: #16a34a;
            --accent-yellow: #F5A623;
            --accent-yellow-hover: #D4880A;
            --accent-red: #E00;
            --accent-red-hover: #C00;
            
            /* Border & shadow - Vercel crisp style */
            --border-color: #333333;
            --border-light: #444444;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.6);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.7);
            
            /* Radius - Vercel minimal */
            --radius-sm: 0.25rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.625rem;
            --radius-full: 9999px;
            
            /* Animation */
            --transition-fast: 150ms ease;
            --transition-normal: 250ms ease;
            --transition-slow: 400ms ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        @media (max-width: 640px) {
            .container {
                padding: 1rem;
            }
        }
        
        header {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, transparent 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 0;
            margin-bottom: 2rem;
        }

        @media (max-width: 640px) {
            header {
                padding: 1rem 0;
                margin-bottom: 1rem;
            }
        }
        
        header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            word-break: keep-all;
        }

        @media (max-width: 640px) {
            header h1 {
                font-size: 1.25rem;
            }
        }
        
        header .subtitle {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        @media (max-width: 640px) {
            header .subtitle {
                font-size: 0.75rem;
            }
        }
        
        /* Dashboard grid with animation */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        @media (max-width: 1200px) {
            .dashboard-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Card component */
        .card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            transition: transform var(--transition-normal), 
                        box-shadow var(--transition-normal),
                        border-color var(--transition-fast);
            animation: fadeInUp 0.4s ease backwards;
        }

        @media (max-width: 640px) {
            .card {
                padding: 1rem;
            }
        }
        
        .card:nth-child(1) { animation-delay: 0ms; }
        .card:nth-child(2) { animation-delay: 50ms; }
        .card:nth-child(3) { animation-delay: 100ms; }
        .card:nth-child(4) { animation-delay: 150ms; }
        .card:nth-child(5) { animation-delay: 200ms; }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--border-light);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .card-subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        
        .card-status {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 600;
            transition: all var(--transition-fast);
        }
        
        .status-ok {
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        
        .status-warning {
            background: rgba(234, 179, 8, 0.15);
            color: var(--accent-yellow);
            border: 1px solid rgba(234, 179, 8, 0.3);
        }
        
        .status-error {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(71, 85, 105, 0.5);
        }
        
        .metric-row:last-child {
            border-bottom: none;
        }
        
        .metric-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        .metric-value {
            font-weight: 600;
            color: var(--text-primary);
        }
        
        /* Progress bar with animation */
        .progress-container {
            margin-top: 1rem;
            background: var(--bg-card);
            border-radius: 9999px;
            height: 8px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            border-radius: 9999px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .progress-low {
            background: linear-gradient(90deg, var(--accent-green), var(--accent-green-hover));
        }
        
        .progress-medium {
            background: linear-gradient(90deg, var(--accent-yellow), var(--accent-yellow-hover));
        }
        
        .progress-high {
            background: linear-gradient(90deg, var(--accent-red), var(--accent-red-hover));
        }
        
        /* Chart container */
        .chart-container {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            animation: fadeInUp 0.4s ease 0.25s backwards;
        }

        @media (max-width: 640px) {
            .chart-container {
                padding: 1rem;
            }
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .chart-title {
            font-size: 1.125rem;
            font-weight: 600;
        }
        
        .chart-controls {
            display: flex;
            gap: 0.5rem;
        }
        
        /* Button styles */
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            transition: all var(--transition-fast);
        }
        
        .btn:hover {
            background: var(--bg-hover);
            transform: translateY(-1px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }
        
        .btn-primary:hover {
            background: var(--accent-blue-hover);
        }
        
        .error-state {
            text-align: center;
            padding: 3rem;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            animation: fadeInUp 0.4s ease;
        }
        
        .error-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .error-message {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }
        
        .timestamp {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .chart-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }

        @media (max-width: 640px) {
            header h1 {
                font-size: 1.25rem;
            }

            header .subtitle {
                font-size: 0.75rem;
            }

            .chart-container {
                padding: 1rem;
            }

            .chart-title {
                font-size: 1rem;
            }
        }
        
        /* Focus visible for accessibility */
        .btn:focus-visible,
        button:focus-visible {
            outline: 2px solid var(--accent-blue);
            outline-offset: 2px;
        }
        
        /* Settings Drawer */
        .settings-drawer {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            max-width: 90vw;
            height: 100vh;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            box-shadow: -8px 0 24px rgba(0, 0, 0, 0.5);
            z-index: 1001;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }
        
        .settings-drawer.open {
            right: 0;
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }
        
        .settings-drawer.open {
            animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .drawer-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
            margin: 0;
        }
        
        .drawer-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem;
            line-height: 1;
        }
        
        .drawer-close:hover {
            color: var(--text-primary);
        }
        
        .drawer-content {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
        }
        
        .setting-section {
            margin-bottom: 2rem;
        }
        
        .setting-section h3 {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .toggle-group {
            display: flex;
            gap: 0.5rem;
        }
        
        .toggle-btn {
            flex: 1;
            padding: 0.625rem 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .toggle-btn:hover {
            border-color: var(--border-light);
        }
        
        .toggle-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }
        
        /* Switch Component (shadcn style) */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 0;
        }
        
        .switch-label {
            font-size: 0.875rem;
            color: var(--text-primary);
        }
        
        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--bg-card);
            border-radius: 9999px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: var(--text-muted);
            border-radius: 9999px;
            transition: all 0.2s ease;
        }
        
        .switch.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }
        
        .switch.active::after {
            transform: translateX(20px);
            background: white;
        }
        
        .drawer-provider-cards {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .drawer-provider-card {
            padding: 0.875rem;
            border-radius: var(--radius-md);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .drawer-provider-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .drawer-provider-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .drawer-provider-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 9999px;
        }
        
        .drawer-provider-badge.enabled {
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent-green);
        }
        
        .drawer-provider-badge.disabled {
            background: rgba(107, 114, 128, 0.15);
            color: var(--text-muted);
        }
        
        .drawer-provider-btn {
            padding: 0.35rem 0.75rem;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            border: none;
        }
        
        .drawer-provider-btn.enable {
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }
        
        .drawer-provider-btn.disable {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }
        
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .drawer-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        
        /* Floating Action Button (FAB) - Desktop only */
        .fab-button {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(17, 17, 17, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            z-index: 999;
        }
        
        .fab-button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .desktop-only {
            display: none;
        }
        
        .mobile-only {
            display: block;
        }
        
        @media (min-width: 768px) {
            .desktop-only {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .mobile-only {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>📊 AI 사용량 관제 대시보드</h1>
                <p class="subtitle">실시간 API 사용량 모니터링</p>
            </div>
            <!-- Mobile: Hamburger Menu -->
            <button id="mobileMenuBtn" class="btn mobile-only" onclick="toggleDrawer()" style="font-size: 1.5rem; padding: 0.5rem; background: transparent; border: none;">
                ☰
            </button>
        </div>
    </header>
    
    <!-- Desktop: Floating Action Button (FAB) -->
    <button id="fabSettingsBtn" class="fab-button desktop-only" onclick="toggleDrawer()" title="설정">
        ⚙️
    </button>
    
    <!-- Settings Drawer -->
    <div id="settingsDrawer" class="settings-drawer">
        <div class="drawer-header">
            <h2>⚙️ 설정</h2>
            <button onclick="toggleDrawer()" class="drawer-close">✕</button>
        </div>
        <div class="drawer-content">
            <!-- Gauge Mode Toggle -->
            <div class="setting-section">
                <h3>📊 게이지바 표시 방식</h3>
                <div class="switch-container">
                    <span class="switch-label">남은량 기준</span>
                    <div id="gaugeModeSwitch" class="switch active" onclick="toggleGaugeMode()"></div>
                </div>
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem;">
                    OFF: 남은량 / ON: 사용량
                </p>
            </div>
            
            <!-- Provider Management -->
            <div class="setting-section">
                <h3>🔌 Provider 관리</h3>
                <div id="drawerProviderCards" class="drawer-provider-cards">
                    로딩 중...
                </div>
            </div>
        </div>
    </div>
    <div id="drawerOverlay" class="drawer-overlay" onclick="toggleDrawer()"></div>
    
    <main class="container">
        {{template "content" .}}
    </main>
    
    <script>
        // Global utility functions
        function formatNumber(num) {
            return new Intl.NumberFormat('ko-KR').format(num);
        }
        
        function formatPercentage(value, total) {
            if (!total || total === 0) return '0%';
            return ((value / total) * 100).toFixed(1) + '%';
        }
        
        function formatDateTime(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleString('ko-KR', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function getUsageClass(percentage) {
            if (percentage < 50) return 'progress-low';
            if (percentage < 80) return 'progress-medium';
            return 'progress-high';
        }
        
        function getStatusClass(hasError, percentage) {
            if (hasError) return 'status-error';
            if (percentage >= 80) return 'status-warning';
            return 'status-ok';
        }
        
        function isStale(isoString) {
            if (!isoString) return true; // No data = stale
            const collectedAt = new Date(isoString);
            const now = new Date();
            const hoursSince = (now - collectedAt) / (1000 * 60 * 60);
            return hoursSince > 2; // Stale if > 2 hours old
        }
        
        // Settings Drawer
        function toggleDrawer() {
            const drawer = document.getElementById('settingsDrawer');
            const overlay = document.getElementById('drawerOverlay');
            drawer.classList.toggle('open');
            overlay.classList.toggle('open');
            if (drawer.classList.contains('open')) {
                loadDrawerProviders();
            }
        }
        
        // Gauge Mode (default: left/remaining)
        let gaugeMode = localStorage.getItem('gaugeMode') || 'left';
        
        function setGaugeMode(mode) {
            gaugeMode = mode;
            localStorage.setItem('gaugeMode', mode);
            
            // Update switch state
            const switchEl = document.getElementById('gaugeModeSwitch');
            if (switchEl) {
                switchEl.classList.toggle('active', mode === 'usage');
            }
            
            // Refresh all progress bars
            refreshProgressBars();
        }
        
        function toggleGaugeMode() {
            const newMode = gaugeMode === 'left' ? 'usage' : 'left';
            setGaugeMode(newMode);
        }
        
        function refreshProgressBars() {
            // Trigger custom event for provider cards to re-render
            window.dispatchEvent(new CustomEvent('gaugeModeChanged', { detail: { mode: gaugeMode } }));
        }
        
        // Initialize gauge mode on load
        document.addEventListener('DOMContentLoaded', function() {
            setGaugeMode(gaugeMode);
        });
        
        // Load providers for drawer
        async function loadDrawerProviders() {
            try {
                const resp = await fetch('/api/providers');
                if (!resp.ok) throw new Error('providers API 실패');
                const data = await resp.json();
                renderDrawerProviders(data.providers || []);
            } catch (e) {
                document.getElementById('drawerProviderCards').innerHTML =
                    '<div style="color: var(--accent-red); font-size: 0.875rem;">Provider 목록을 불러올 수 없습니다</div>';
            }
        }
        
        function renderDrawerProviders(providers) {
            const container = document.getElementById('drawerProviderCards');
            if (!providers.length) {
                container.innerHTML = '<div style="color: var(--text-muted); font-size: 0.875rem;">등록된 Provider가 없습니다</div>';
                return;
            }
            container.innerHTML = providers.map(p => {
                const isEnabled = p.enabled;
                const badgeClass = isEnabled ? 'enabled' : 'disabled';
                const badgeText = isEnabled ? '활성' : '비활성';
                const btnClass = isEnabled ? 'disable' : 'enable';
                const btnText = isEnabled ? '비활성화' : '활성화';
                const btnAction = isEnabled ? 'disable' : 'enable';
                
                return `<div class="drawer-provider-card">
                    <div class="drawer-provider-info">
                        <span class="drawer-provider-name">${p.display_name || p.name}</span>
                        <span class="drawer-provider-badge ${badgeClass}">${badgeText}</span>
                    </div>
                    <button onclick="toggleProviderInDrawer('${p.name}', '${btnAction}')"
                        class="drawer-provider-btn ${btnClass}"
                        id="drawer-btn-${p.name}">
                        ${btnText}
                    </button>
                </div>`;
            }).join('');
        }
        
        async function toggleProviderInDrawer(name, action) {
            const btn = document.getElementById(`drawer-btn-${name}`);
            if (btn) { btn.disabled = true; btn.textContent = '처리 중...'; }
            try {
                const resp = await fetch(`/api/providers/${name}/${action}`, { method: 'POST' });
                const data = await resp.json();
                if (!resp.ok) {
                    alert(`${action === 'enable' ? '활성화' : '비활성화'} 실패: ${data.error}`);
                    if (btn) { btn.disabled = false; btn.textContent = action === 'enable' ? '활성화' : '비활성화'; }
                    return;
                }
                await loadDrawerProviders();
                // Also refresh main page provider cards
                if (typeof loadProviderManagement === 'function') {
                    loadProviderManagement();
                }
                // Reload page to reflect changes in main cards
                setTimeout(() => location.reload(), 500);
            } catch (e) {
                alert('요청 실패: ' + e.message);
                if (btn) { btn.disabled = false; }
            }
        }
    </script>
    
    {{block "scripts" .}}{{end}}
</body>
</html>
