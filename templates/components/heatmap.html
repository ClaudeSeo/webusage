{{define "heatmap"}}
<style>
.heatmap-container {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    border: 1px solid var(--border-color);
    margin-bottom: 2rem;
    animation: fadeInUp 0.4s ease 0.3s backwards;
}

@media (max-width: 640px) {
    .heatmap-container {
        padding: 1rem;
    }
}

.heatmap-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 1rem;
}

.heatmap-title {
    font-size: 1.125rem;
    font-weight: 600;
}

.heatmap-tabs {
    display: flex;
    background: var(--bg-card);
    border-radius: var(--radius-md);
    padding: 4px;
    border: 1px solid var(--border-color);
}

.heatmap-tab {
    padding: 0.5rem 1rem;
    border-radius: calc(var(--radius-md) - 2px);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    transition: all 0.2s ease;
}

.heatmap-tab:hover {
    color: var(--text-primary);
}

.heatmap-tab.active {
    background: var(--accent-blue);
    color: white;
}

/* 그리드 레이아웃 */
.heatmap-grid-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

.heatmap-grid {
    display: grid;
    /* Y축 레이블 컬럼 + 시간 24칸 */
    grid-template-columns: 40px repeat(24, 1fr);
    gap: 2px;
    min-width: 500px;
}

/* X축 헤더 행 (시간 레이블) */
.heatmap-hour-label {
    font-size: 0.65rem;
    color: var(--text-secondary);
    text-align: center;
    padding-bottom: 4px;
    line-height: 1;
}

.heatmap-hour-label.hidden {
    visibility: hidden;
}

/* Y축 요일 레이블 */
.heatmap-day-label {
    font-size: 0.7rem;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 6px;
    white-space: nowrap;
}

/* 히트맵 셀 */
.heatmap-cell {
    width: 100%;
    aspect-ratio: 1;
    min-width: 14px;
    min-height: 14px;
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    transition: transform 0.1s ease;
}

.heatmap-cell:hover {
    transform: scale(1.3);
    z-index: 10;
}

@media (max-width: 640px) {
    .heatmap-cell {
        min-width: 10px;
        min-height: 10px;
    }
    .heatmap-day-label {
        font-size: 0.6rem;
        padding-right: 4px;
    }
}

/* Tooltip */
.heatmap-tooltip {
    position: fixed;
    background: rgba(0, 0, 0, 0.92);
    color: #ededed;
    font-size: 0.75rem;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    pointer-events: none;
    white-space: nowrap;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.12s ease;
}

.heatmap-tooltip.visible {
    opacity: 1;
}

/* 범례 */
.heatmap-legend {
    display: flex;
    align-items: center;
    gap: 4px;
    justify-content: flex-end;
    margin-top: 0.75rem;
}

.heatmap-legend-label {
    font-size: 0.7rem;
    color: var(--text-secondary);
}

.heatmap-legend-cell {
    width: 14px;
    height: 14px;
    border-radius: 2px;
}

/* 빈 상태 */
.heatmap-empty {
    text-align: center;
    color: var(--text-secondary);
    padding: 3rem;
}

.heatmap-empty-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
}

.heatmap-empty-text {
    font-size: 0.875rem;
}

/* 로딩 */
.heatmap-loading {
    text-align: center;
    color: var(--text-secondary);
    padding: 2rem;
    font-size: 0.875rem;
}
</style>

<div class="heatmap-container">
    <div class="heatmap-header">
        <h3 class="heatmap-title">🌿 활동 히트맵</h3>
        <div class="heatmap-tabs">
            <button class="heatmap-tab active" data-range="7d" onclick="switchHeatmapRange('7d')">7d</button>
            <button class="heatmap-tab" data-range="30d" onclick="switchHeatmapRange('30d')">30d</button>
        </div>
    </div>

    <div id="heatmapContent">
        <div class="heatmap-loading">데이터를 불러오는 중...</div>
    </div>
</div>

<!-- Tooltip 싱글톤 -->
<div id="heatmapTooltip" class="heatmap-tooltip"></div>

<script>
(function() {
    // GitHub 스타일 다크 테마 색상
    var HEATMAP_COLORS = ['#161b22', '#0e4429', '#006d32', '#26a641', '#39d353'];
    var DAY_LABELS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

    var currentHeatmapRange = '7d';
    var currentHeatmapProvider = 'all';

    function getHeatmapColor(value, maxValue) {
        if (!value || value <= 0 || !maxValue) return HEATMAP_COLORS[0];
        var ratio = value / maxValue;
        if (ratio < 0.25) return HEATMAP_COLORS[1];
        if (ratio < 0.50) return HEATMAP_COLORS[2];
        if (ratio < 0.75) return HEATMAP_COLORS[3];
        return HEATMAP_COLORS[4];
    }

    function loadHeatmapData(range, providerFilter) {
        var url = '/api/heatmap?range=' + encodeURIComponent(range);
        if (providerFilter && providerFilter !== 'all') {
            url += '&provider_id=' + encodeURIComponent(providerFilter);
        }
        fetch(url)
            .then(function(resp) {
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                return resp.json();
            })
            .then(function(data) {
                renderHeatmap(data);
            })
            .catch(function(err) {
                console.error('히트맵 데이터 로드 오류:', err);
                document.getElementById('heatmapContent').innerHTML =
                    '<div class="heatmap-empty">' +
                    '<div class="heatmap-empty-icon">🌿</div>' +
                    '<div class="heatmap-empty-text">데이터를 불러올 수 없습니다</div>' +
                    '</div>';
            });
    }

    function renderHeatmap(data) {
        var container = document.getElementById('heatmapContent');

        if (!data || !data.data || data.data.length === 0) {
            container.innerHTML =
                '<div class="heatmap-empty">' +
                '<div class="heatmap-empty-icon">🌿</div>' +
                '<div class="heatmap-empty-text">표시할 활동 데이터가 없습니다</div>' +
                '</div>';
            return;
        }

        // (day, hour) → value 맵 구성
        var valueMap = {};
        data.data.forEach(function(d) {
            valueMap[d.day + '_' + d.hour] = d.value;
        });

        var maxValue = data.max_value || 1;
        var hours = data.hours || [];
        if (!hours.length) {
            for (var i = 0; i < 24; i++) hours.push(i);
        }
        var days = data.days || DAY_LABELS;

        // 헤더 행: 빈 코너 + 시간 레이블
        var headerCells = '<div></div>';
        hours.forEach(function(h) {
            var show = (h % 6 === 0);
            headerCells += '<div class="heatmap-hour-label' + (show ? '' : ' hidden') + '">' +
                (show ? h + 'h' : '') + '</div>';
        });

        // 데이터 행: 요일 레이블 + 셀
        var dataRows = '';
        days.forEach(function(dayLabel, dayIndex) {
            dataRows += '<div class="heatmap-day-label">' + dayLabel + '</div>';
            hours.forEach(function(h) {
                var val = valueMap[dayIndex + '_' + h] || 0;
                var color = getHeatmapColor(val, maxValue);
                var tip = dayLabel + ' ' + h + '\uc2dc: ' + val.toFixed(1);
                dataRows += '<div class="heatmap-cell"' +
                    ' style="background:' + color + '"' +
                    ' data-tip="' + tip + '"' +
                    ' onmouseenter="showHeatmapTooltip(event, this)"' +
                    ' onmouseleave="hideHeatmapTooltip()"></div>';
            });
        });

        // 범례
        var legendCells = HEATMAP_COLORS.map(function(c) {
            return '<div class="heatmap-legend-cell" style="background:' + c + '"></div>';
        }).join('');
        var legendHTML =
            '<div class="heatmap-legend">' +
            '<span class="heatmap-legend-label">낮음</span>' +
            legendCells +
            '<span class="heatmap-legend-label">높음</span>' +
            '</div>';

        container.innerHTML =
            '<div class="heatmap-grid-wrapper">' +
            '<div class="heatmap-grid">' +
            headerCells + dataRows +
            '</div>' +
            '</div>' +
            legendHTML;
    }

    function switchHeatmapRange(range) {
        currentHeatmapRange = range;
        document.querySelectorAll('.heatmap-tab').forEach(function(tab) {
            tab.classList.toggle('active', tab.dataset.range === range);
        });
        loadHeatmapData(range, currentHeatmapProvider);
    }

    // trend_chart provider chip 클릭 이벤트 위임으로 heatmap 연동
    document.addEventListener('click', function(e) {
        var chip = e.target.closest('.provider-chip[data-provider]');
        if (chip) {
            currentHeatmapProvider = chip.dataset.provider || 'all';
            loadHeatmapData(currentHeatmapRange, currentHeatmapProvider);
        }
    });

    // 전역 노출
    window.switchHeatmapRange = switchHeatmapRange;

    // Tooltip 핸들러
    window.showHeatmapTooltip = function(event, el) {
        var tooltip = document.getElementById('heatmapTooltip');
        tooltip.textContent = el.dataset.tip || '';
        tooltip.classList.add('visible');
        positionHeatmapTooltip(event);
    };

    window.hideHeatmapTooltip = function() {
        document.getElementById('heatmapTooltip').classList.remove('visible');
    };

    function positionHeatmapTooltip(event) {
        var tooltip = document.getElementById('heatmapTooltip');
        var offset = 12;
        var x = event.clientX + offset;
        var y = event.clientY + offset;
        // 뷰포트 오른쪽 경계 보정
        if (x + 180 > window.innerWidth) {
            x = event.clientX - 180 - offset;
        }
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
    }

    document.addEventListener('mousemove', function(e) {
        var tooltip = document.getElementById('heatmapTooltip');
        if (tooltip && tooltip.classList.contains('visible')) {
            positionHeatmapTooltip(e);
        }
    });

    // 초기 로드
    document.addEventListener('DOMContentLoaded', function() {
        loadHeatmapData('7d', 'all');
    });
})();
</script>
{{end}}
