{{define "heatmap"}}
<style>
.heatmap-container {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    border: 1px solid var(--border-color);
    margin-bottom: 2rem;
    animation: fadeInUp 0.4s ease 0.3s backwards;
}

@media (max-width: 640px) {
    .heatmap-container {
        padding: 1rem;
    }
}

.heatmap-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 1rem;
}

.heatmap-title {
    font-size: 1.125rem;
    font-weight: 600;
}

.heatmap-tabs {
    display: flex;
    background: var(--bg-card);
    border-radius: var(--radius-md);
    padding: 4px;
    border: 1px solid var(--border-color);
}

.heatmap-tab {
    padding: 0.5rem 1rem;
    border-radius: calc(var(--radius-md) - 2px);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    transition: all 0.2s ease;
}

.heatmap-tab:hover {
    color: var(--text-primary);
}

.heatmap-tab.active {
    background: var(--accent-blue);
    color: white;
}

/* SVG heatmap wrapper */
.heatmap-scroll-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 0.5rem;
}

.heatmap-scroll-wrapper::-webkit-scrollbar {
    height: 6px;
}

.heatmap-scroll-wrapper::-webkit-scrollbar-track {
    background: var(--bg-secondary);
}

.heatmap-scroll-wrapper::-webkit-scrollbar-thumb {
    background: var(--border-color);
    border-radius: 3px;
}

/* Tooltip */
.heatmap-tooltip {
    position: fixed;
    background: rgba(0, 0, 0, 0.92);
    color: #ededed;
    font-size: 0.75rem;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    pointer-events: none;
    white-space: nowrap;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.12s ease;
}

.heatmap-tooltip.visible {
    opacity: 1;
}

/* Legend */
.heatmap-legend {
    display: flex;
    align-items: center;
    gap: 4px;
    justify-content: flex-end;
    margin-top: 0.75rem;
}

.heatmap-legend-label {
    font-size: 0.7rem;
    color: var(--text-secondary);
}

.heatmap-legend-cell {
    width: 14px;
    height: 14px;
    border-radius: 2px;
}

/* Empty state */
.heatmap-empty {
    text-align: center;
    color: var(--text-secondary);
    padding: 3rem;
}

.heatmap-empty-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
}

.heatmap-empty-text {
    font-size: 0.875rem;
}

/* Loading */
.heatmap-loading {
    text-align: center;
    color: var(--text-secondary);
    padding: 2rem;
    font-size: 0.875rem;
}

/* SVG cell hover */
.heatmap-cell-rect {
    transition: stroke 0.1s ease;
    cursor: pointer;
}

.heatmap-cell-rect:hover {
    stroke: rgba(255, 255, 255, 0.4);
    stroke-width: 1.5;
}
</style>

<div class="heatmap-container">
    <div class="heatmap-header">
        <h3 class="heatmap-title">🌿 활동 히트맵</h3>
        <div class="heatmap-tabs">
            <button class="heatmap-tab" data-range="7d" onclick="switchHeatmapRange('7d')">7d</button>
            <button class="heatmap-tab" data-range="30d" onclick="switchHeatmapRange('30d')">30d</button>
            <button class="heatmap-tab active" data-range="1y" onclick="switchHeatmapRange('1y')">1y</button>
        </div>
    </div>

    <div id="heatmapContent">
        <div class="heatmap-loading">데이터를 불러오는 중...</div>
    </div>
</div>

<!-- Tooltip singleton -->
<div id="heatmapTooltip" class="heatmap-tooltip"></div>

<script>
(function() {
    var HEATMAP_COLORS = ['#161b22', '#0e4429', '#006d32', '#26a641', '#39d353'];
    var DAY_LABELS = ['Mon', '', 'Wed', '', 'Fri', '', 'Sun'];

    var CELL_SIZE = 14;
    var CELL_GAP = 3;
    var CELL_STEP = CELL_SIZE + CELL_GAP;
    var LABEL_LEFT = 40;
    var LABEL_TOP = 20;

    var currentHeatmapRange = '1y';
    var currentHeatmapProvider = 'all';

    function getHeatmapColor(value, maxValue) {
        if (!value || value <= 0 || !maxValue) return HEATMAP_COLORS[0];
        var ratio = value / maxValue;
        if (ratio < 0.25) return HEATMAP_COLORS[1];
        if (ratio < 0.50) return HEATMAP_COLORS[2];
        if (ratio < 0.75) return HEATMAP_COLORS[3];
        return HEATMAP_COLORS[4];
    }

    function formatValue(val) {
        if (val === undefined || val === null) return '0';
        return val % 1 === 0 ? val.toString() : val.toFixed(1);
    }

    function loadHeatmapData(range, providerFilter) {
        var url = '/api/heatmap?range=' + encodeURIComponent(range);
        if (providerFilter && providerFilter !== 'all') {
            url += '&provider_id=' + encodeURIComponent(providerFilter);
        }
        fetch(url)
            .then(function(resp) {
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                return resp.json();
            })
            .then(function(data) {
                renderHeatmap(data);
            })
            .catch(function(err) {
                console.error('히트맵 데이터 로드 오류:', err);
                document.getElementById('heatmapContent').innerHTML =
                    '<div class="heatmap-empty">' +
                    '<div class="heatmap-empty-icon">🌿</div>' +
                    '<div class="heatmap-empty-text">데이터를 불러올 수 없습니다</div>' +
                    '</div>';
            });
    }

    function renderHeatmap(data) {
        var container = document.getElementById('heatmapContent');

        if (!data || !data.weeks || data.weeks.length === 0) {
            container.innerHTML =
                '<div class="heatmap-empty">' +
                '<div class="heatmap-empty-icon">🌿</div>' +
                '<div class="heatmap-empty-text">표시할 활동 데이터가 없습니다</div>' +
                '</div>';
            return;
        }

        var weeks = data.weeks;
        var months = data.months || [];
        var maxValue = data.max_value || 1;

        var svgWidth = LABEL_LEFT + weeks.length * CELL_STEP + 20;
        var svgHeight = LABEL_TOP + 7 * CELL_STEP + 10;

        // Build SVG
        var svg = '<svg width="' + svgWidth + '" height="' + svgHeight + '" xmlns="http://www.w3.org/2000/svg" style="display:block;">';

        // Month labels
        months.forEach(function(m) {
            var x = LABEL_LEFT + m.week * CELL_STEP;
            svg += '<text x="' + x + '" y="12" fill="#8b949e" font-size="11" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">' + m.label + '</text>';
        });

        // Day labels (Mon, Wed, Fri)
        for (var dow = 0; dow < 7; dow++) {
            if (DAY_LABELS[dow]) {
                var y = LABEL_TOP + dow * CELL_STEP + CELL_SIZE - 2;
                svg += '<text x="0" y="' + y + '" fill="#8b949e" font-size="11" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">' + DAY_LABELS[dow] + '</text>';
            }
        }

        // Cells
        weeks.forEach(function(week, weekIdx) {
            for (var dow = 0; dow < 7; dow++) {
                var x = LABEL_LEFT + weekIdx * CELL_STEP;
                var y = LABEL_TOP + dow * CELL_STEP;
                var day = week.days[dow];
                var value = day ? day.value : 0;
                var color = getHeatmapColor(value, maxValue);
                var dateStr = day ? day.date : '';
                var tip = dateStr ? dateStr + ': ' + formatValue(value) : '';

                svg += '<rect class="heatmap-cell-rect" x="' + x + '" y="' + y + '" width="' + CELL_SIZE + '" height="' + CELL_SIZE + '" rx="2" ry="2" fill="' + color + '" data-tip="' + tip + '" onmouseenter="showHeatmapTooltip(event, this)" onmouseleave="hideHeatmapTooltip()"/>';
            }
        });

        svg += '</svg>';

        // Legend
        var legendCells = HEATMAP_COLORS.map(function(c) {
            return '<div class="heatmap-legend-cell" style="background:' + c + '"></div>';
        }).join('');

        container.innerHTML =
            '<div class="heatmap-scroll-wrapper">' + svg + '</div>' +
            '<div class="heatmap-legend">' +
            '<span class="heatmap-legend-label">낮음</span>' +
            legendCells +
            '<span class="heatmap-legend-label">높음</span>' +
            '</div>';
    }

    function switchHeatmapRange(range) {
        currentHeatmapRange = range;
        document.querySelectorAll('.heatmap-tab').forEach(function(tab) {
            tab.classList.toggle('active', tab.dataset.range === range);
        });
        loadHeatmapData(range, currentHeatmapProvider);
    }

    // Provider chip click integration
    document.addEventListener('click', function(e) {
        var chip = e.target.closest('.provider-chip[data-provider]');
        if (chip) {
            currentHeatmapProvider = chip.dataset.provider || 'all';
            loadHeatmapData(currentHeatmapRange, currentHeatmapProvider);
        }
    });

    // Global exports
    window.switchHeatmapRange = switchHeatmapRange;

    // Tooltip handlers
    window.showHeatmapTooltip = function(event, el) {
        var tooltip = document.getElementById('heatmapTooltip');
        var tip = el.getAttribute('data-tip') || '';
        if (!tip) return;
        tooltip.textContent = tip;
        tooltip.classList.add('visible');
        positionHeatmapTooltip(event);
    };

    window.hideHeatmapTooltip = function() {
        document.getElementById('heatmapTooltip').classList.remove('visible');
    };

    function positionHeatmapTooltip(event) {
        var tooltip = document.getElementById('heatmapTooltip');
        var offset = 12;
        var x = event.clientX + offset;
        var y = event.clientY + offset;
        if (x + 180 > window.innerWidth) {
            x = event.clientX - 180 - offset;
        }
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
    }

    document.addEventListener('mousemove', function(e) {
        var tooltip = document.getElementById('heatmapTooltip');
        if (tooltip && tooltip.classList.contains('visible')) {
            positionHeatmapTooltip(e);
        }
    });

    // Initial load
    document.addEventListener('DOMContentLoaded', function() {
        loadHeatmapData('1y', 'all');
    });
})();
</script>
{{end}}
